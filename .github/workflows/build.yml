name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true
      
      - name: Verify Flutter installation
        run: flutter --version && flutter doctor -v
      
      - name: Clean pub cache (fix file_picker v1 embedding issue)
        run: |
          rm -rf ~/.pub-cache/hosted/pub.dev/file_picker*
          flutter pub cache repair
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true
      
      - name: Build APK (split-per-abi for testing on your phone)
        run: flutter build apk --split-per-abi --release
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: Upload all APK variants
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-all-variants
          path: build/app/outputs/flutter-apk/
          retention-days: 30
