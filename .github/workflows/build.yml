name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: biohacker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: Upload to transfer.sh
        if: success()
        run: |
          curl --upload-file build/app/outputs/flutter-apk/app-release.apk https://transfer.sh/biohacker-app.apk
          echo "APK uploaded to transfer.sh"
