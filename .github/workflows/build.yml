# Required GitHub Secrets:
#   SUPABASE_URL         - Your Supabase project URL
#   SUPABASE_ANON_KEY    - Your Supabase anonymous/public key
#   LAB_PDF_ENDPOINT     - (optional) Lab PDF processing endpoint
#   LAB_PDF_API_KEY      - (optional) Lab PDF API authentication key
#   BLOODWORK_AI_API_KEY - (optional) Bloodwork AI API key

name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true
      
      - name: Verify Flutter installation
        run: flutter --version && flutter doctor -v

      - name: Flutter clean
        run: flutter clean

      - name: Nuke cache completely
        run: |
          rm -rf ~/.pub-cache
          rm -rf ~/.dart-tool
          rm -f pubspec.lock
          rm -rf build/
          rm -rf .dart_tool
      
      - name: Verify pubspec.yaml has NO file_picker
        run: |
          grep -i "file_picker" pubspec.yaml && echo "ERROR: file_picker still in pubspec.yaml" && exit 1 || echo "OK: file_picker not in pubspec.yaml"
      
      - name: Get fresh dependencies
        run: flutter pub get
      
      - name: Remove file_picker and win32 from cache post-fetch
        run: |
          rm -rf ~/.pub-cache/hosted/pub.dev/file_picker* || true
          rm -rf ~/.pub-cache/hosted/pub.dev/win32* || true
          rm -rf .dart_tool/package_config.json || true
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true
      
      - name: Build APK (split-per-abi for testing on your phone)
        run: |
          flutter build apk --split-per-abi --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=LAB_PDF_ENDPOINT=${{ secrets.LAB_PDF_ENDPOINT }} \
            --dart-define=LAB_PDF_API_KEY=${{ secrets.LAB_PDF_API_KEY }} \
            --dart-define=BLOODWORK_AI_API_KEY=${{ secrets.BLOODWORK_AI_API_KEY }}
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: Upload all APK variants
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-all-variants
          path: build/app/outputs/flutter-apk/
          retention-days: 30
