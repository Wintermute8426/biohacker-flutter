# Required GitHub Secrets:
#   SUPABASE_URL         - Your Supabase project URL
#   SUPABASE_ANON_KEY    - Your Supabase anonymous/public key
#   LAB_PDF_ENDPOINT     - (optional) Lab PDF processing endpoint
#   LAB_PDF_API_KEY      - (optional) Lab PDF API authentication key
#   BLOODWORK_AI_API_KEY - (optional) Bloodwork AI API key

name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true
      
      - name: Verify Flutter installation
        run: flutter --version && flutter doctor -v

      - name: Flutter clean
        run: flutter clean

      - name: Nuke cache completely
        run: |
          rm -rf ~/.pub-cache
          rm -rf ~/.dart-tool
          rm -f pubspec.lock
          rm -rf build/
          rm -rf .dart_tool
      
      - name: Verify pubspec.yaml has NO file_picker
        run: |
          grep -i "file_picker" pubspec.yaml && echo "ERROR: file_picker still in pubspec.yaml" && exit 1 || echo "OK: file_picker not in pubspec.yaml"
      
      - name: Get fresh dependencies
        run: flutter pub get
      
      - name: Remove file_picker and win32 from cache post-fetch
        run: |
          rm -rf ~/.pub-cache/hosted/pub.dev/file_picker* || true
          rm -rf ~/.pub-cache/hosted/pub.dev/win32* || true
          rm -rf .dart_tool/package_config.json || true
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true
      
      - name: Setup keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "${KEYSTORE_BASE64}" ]; then
            mkdir -p android/app/keystore
            echo "${KEYSTORE_BASE64}" | base64 -d > android/app/keystore/biohacker-release-v2.jks
            echo "Keystore restored to: $(pwd)/android/app/keystore/biohacker-release-v2.jks"
            ls -lh android/app/keystore/
          else
            echo "Warning: KEYSTORE_BASE64 secret not set — build will be unsigned"
          fi

      - name: Build APK (split-per-abi for testing on your phone)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LAB_PDF_ENDPOINT: ${{ secrets.LAB_PDF_ENDPOINT }}
          LAB_PDF_API_KEY: ${{ secrets.LAB_PDF_API_KEY }}
          BLOODWORK_AI_API_KEY: ${{ secrets.BLOODWORK_AI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEY_ALIAS: biohacker
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: keystore/biohacker-release-v2.jks
        run: |
          # Trim whitespace from secrets
          SUPABASE_URL=$(echo "${SUPABASE_URL}" | tr -d '\n' | xargs)
          SUPABASE_ANON_KEY=$(echo "${SUPABASE_ANON_KEY}" | tr -d '\n' | xargs)
          LAB_PDF_ENDPOINT=$(echo "${LAB_PDF_ENDPOINT}" | tr -d '\n' | xargs)
          LAB_PDF_API_KEY=$(echo "${LAB_PDF_API_KEY}" | tr -d '\n' | xargs)
          BLOODWORK_AI_API_KEY=$(echo "${BLOODWORK_AI_API_KEY}" | tr -d '\n' | xargs)
          ANTHROPIC_API_KEY=$(echo "${ANTHROPIC_API_KEY}" | tr -d '\n' | xargs)
          
          flutter build apk --split-per-abi --release \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=LAB_PDF_ENDPOINT="${LAB_PDF_ENDPOINT}" \
            --dart-define=LAB_PDF_API_KEY="${LAB_PDF_API_KEY}" \
            --dart-define=BLOODWORK_AI_API_KEY="${BLOODWORK_AI_API_KEY}" \
            --dart-define=ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
      
      - name: Upload all APK variants
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-apk-all-variants
          path: build/app/outputs/flutter-apk/
          retention-days: 30
